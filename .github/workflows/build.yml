name: Build and Deploy

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-package:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dos2unix

      - name: Build package
        run: make sms2gram-ipk

      - name: Upload files
        uses: actions/upload-artifact@v7
        with:
          name: sms2gram
          path: ./out/sms2gram_*.ipk
          if-no-files-found: error

      - name: Summary
        run: |
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls ./out/sms2gram_*.ipk >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  publish-latest-release:
    runs-on: ubuntu-22.04
    needs: [ build-package ]
    env:
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: out
          merge-multiple: true

      - name: Resolve latest target release
        id: target-release
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            const picked = releases.find((rel) => !rel.draft && !rel.prerelease);
            if (!picked) {
              core.setFailed('No release found to update');
              return;
            }

            core.setOutput('id', String(picked.id));
            core.setOutput('tag', picked.tag_name);

      - name: Remove previous sms2gram ipk assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.target-release.outputs.id }}
        run: |
          gh api "repos/${{ github.repository }}/releases/${RELEASE_ID}/assets" \
            --jq '.[] | select(.name | test("^sms2gram_.*\\.ipk$")) | .id' \
            | while read -r asset_id; do
                [ -n "$asset_id" ] || continue
                gh api -X DELETE "repos/${{ github.repository }}/releases/assets/${asset_id}"
              done

      - name: Upload new sms2gram ipk assets to latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.target-release.outputs.tag }}
        run: |
          ls -la ./out/sms2gram_*.ipk
          gh release upload "$TAG" ./out/sms2gram_*.ipk --clobber

      - name: Summary
        run: |
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Updated channel: release" >> $GITHUB_STEP_SUMMARY
          echo "Release tag: ${{ steps.target-release.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          ls ./out/sms2gram_*.ipk >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Dispatch
        if: success()
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.AGGREGATOR_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/spatiumstas/feedly/dispatches \
            -d '{"event_type":"package-built","client_payload":{"package":"${{ github.repository }}","channel":"release","tag":"${{ steps.target-release.outputs.tag }}"}}'